<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USSR Legacy</title>

<style>

body{
    margin:0;
    background:#7a0000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
    margin-top:50px;
}

.title{
    color:gold;
    font-size:72px;
    font-weight:bold;

    text-shadow:
        0 0 10px gold,
        0 0 20px gold,
        0 0 30px orange;
}

.subtitle{
    color:gold;
    font-size:24px;
    margin-top:20px;
}

.banner{
    position:fixed;
    bottom:15px;
    left:0;
    width:100%;
    overflow:hidden;
}

.track{
    display:inline-block;
    white-space:nowrap;
    font-size:90px;
    animation:move 20s linear infinite;
    will-change:transform;
}

@keyframes move{
    from{
        transform:translateX(100%);
    }
    to{
        transform:translateX(-100%);
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        ☭ USSR LEGACY ☭

</div>

    </div>
</div>

</body>
</html>
