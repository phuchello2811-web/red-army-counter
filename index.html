<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USSR Counter</title>

<style>
body{
    margin:0;
    background:#7a0000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
    margin-top:25px;
}

.title{
    color:gold;
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.counter{
    display:flex;
    justify-content:center;
    gap:4px;
}

.digit{
    width:55px;
    height:75px;
    background:#111;
    border:2px solid #333;
    border-radius:5px;

    color:#7dff7d;
    font-size:52px;
    font-family:Consolas, monospace;

    display:flex;
    justify-content:center;
    align-items:center;
}

.subtitle{
    color:gold;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

.marquee{
    position:absolute;
    bottom:15px;
    left:-2000px;
    font-size:36px;
    white-space:nowrap;
    animation:move 30s linear infinite;
}

@keyframes move{
    from{ left:-2000px; }
    to{ left:100%; }
}
</style>
</head>

<body>

<div class="container">

<div class="title">
☭ USSR VISITOR COUNTER ☭
</div>

<div class="counter" id="counter"></div>

<div class="subtitle">
THERE IS NO MY PROFILE. ONLY OUR PROFILE.
</div>

</div>

<div class="marquee">
☭ 🔨☭ 🔨☭ 🔨☭ 🔨☭ 🔨☭ 🔨☭ 🔨☭ 🔨☭
</div>

<script>

// đổi namespace để chắc chắn đếm được
fetch("https://api.countapi.xyz/hit/phuchello2811web/ussrcounter")
.then(r => r.json())
.then(data => {

    let num = String(data.value).padStart(7,'0');

    let html = "";

    for(let c of num){
        html += `<div class="digit">${c}</div>`;
    }

    document.getElementById("counter").innerHTML = html;
})
.catch(() => {

    document.getElementById("counter").innerHTML =
    `
    <div class="digit">0</div>
    <div class="digit">0</div>
    <div class="digit">0</div>
    <div class="digit">0</div>
    <div class="digit">0</div>
    <div class="digit">0</div>
    <div class="digit">0</div>
    `;
});

</script>

</body>
</html>
