<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Army Counter</title>

<style>

body{
    margin:0;
    background:#7a0000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.flag{
    position:absolute;
    top:10px;
    left:15px;
    color:gold;
    font-size:40px;
}

.star{
    position:absolute;
    top:10px;
    right:15px;
    color:gold;
    font-size:40px;
}

.container{
    text-align:center;
    margin-top:25px;
}

.title{
    color:gold;
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.counter{
    display:flex;
    justify-content:center;
    gap:4px;
}

.digit{
    width:55px;
    height:75px;

    background:#111;
    border:2px solid #333;
    border-radius:5px;

    color:#7dff7d;
    font-size:52px;
    font-family:Consolas, monospace;

    display:flex;
    justify-content:center;
    align-items:center;
}

.subtitle{
    color:gold;
    margin-top:18px;
    font-size:20px;
    font-weight:bold;
}

.flags{
    position:absolute;
    bottom:15px;
    left:-1600px;

    font-size:34px;
    white-space:nowrap;

    animation:moveflags 25s linear infinite;
}

@keyframes moveflags{
    from{
        left:-1600px;
    }
    to{
        left:100%;
    }
}

</style>
</head>

<body>

<div class="flag">☭</div>
<div class="star">★</div>

<div class="container">

<div class="title">
☭ RED ARMY VISITOR COUNTER ☭
</div>

<div class="counter" id="counter"></div>

<div class="subtitle">
THERE IS NO MY PROFILE. ONLY OUR PROFILE.
</div>

</div>

<div class="flags">
☭ ➜ 🇷🇺 🇺🇦 🇧🇾 🇰🇿 🇺🇿 🇬🇪 🇦🇲 🇦🇿 🇱🇹 🇱🇻 🇪🇪 🇲🇩 🇰🇬 🇹🇯 🇹🇲
</div>

<script>

fetch("https://api.countapi.xyz/hit/phuchello2811-web/red-army-counter")
.then(r => r.json())
.then(data => {

    let num = String(data.value).padStart(7,'0');

    let html = "";

    for(let c of num){
        html += `<div class="digit">${c}</div>`;
    }

    document.getElementById("counter").innerHTML = html;
})
.catch(() => {

    let html = "";

    for(let i=0;i<7;i++){
        html += `<div class="digit">0</div>`;
    }

    document.getElementById("counter").innerHTML = html;
});

</script>

</body>
</html>
