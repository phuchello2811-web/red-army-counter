<!DOCTYPE html>

<title>USSR Visitor Counter</title>

<style>
body{
    margin:0;
    background:#7a0000;
    color:gold;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    margin-top:30px;
}

.title{
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.badge{

}

.badge img{
    height:35px;
}

.subtitle{

.flags{
    position:absolute;
    bottom:10px;
    white-space:nowrap;
    font-size:34px;
    animation:move 35s linear infinite;

@keyframes move{
    from{

    to{
        transform:translateX(100vw);
    }
}
